name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip, curl, fileinfo, dom, xml
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader

      - name: Install NativePHP Mobile
        run: |
          composer require nativephp/mobile --no-interaction
          php artisan native:install android --no-interaction

      - name: Verify native.php exists
        run: |
          if [ -f "vendor/nativephp/mobile/bootstrap/android/native.php" ]; then
            echo "native.php found"
          else
            echo "native.php NOT found"
            exit 1
          fi

      - name: Create Keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Create .env with signing config
        run: |
          cat > .env << 'EOF'
          APP_NAME=Laravel
          APP_ENV=production
          APP_KEY=base64:CHANGE_THIS_IN_PRODUCTION
          APP_DEBUG=false
          LOG_CHANNEL=errorlog

          NATIVEPHP_APP_ID=com.mohamedmohamed.swiftgoldenlunar
          NATIVEPHP_APP_VERSION=1.0.${{ github.run_number }}
          NATIVEPHP_APP_VERSION_CODE=${{ github.run_number }}

          ANDROID_KEYSTORE_FILE=credentials/android/app.keystore
          ANDROID_KEYSTORE_PASSWORD=android
          ANDROID_KEY_ALIAS=myapp
          ANDROID_KEY_PASSWORD=android
          EOF

          echo ".env created successfully"
          cat .env | grep -i "ANDROID_"

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          nativephp.app_id=com.mohamedmohamed.swiftgoldenlunar
          nativephp.version_code=${{ github.run_number }}
          nativephp.version_name=1.0.${{ github.run_number }}
          nativephp.minify_enabled=false
          nativephp.shrink_resources=false
          nativephp.debug_symbols=FULL
          MYAPP_UPLOAD_STORE_FILE=credentials/android/app.keystore
          MYAPP_UPLOAD_KEY_ALIAS=myapp
          MYAPP_UPLOAD_STORE_PASSWORD=android
          MYAPP_UPLOAD_KEY_PASSWORD=android
          EOF

          echo "gradle.properties created"
          cat gradle.properties

      - name: Debug - Show file locations
        run: |
          echo "=== File locations ==="
          ls -la credentials/android/
          ls -la .env
          ls -la gradle.properties
          pwd

      - name: Debug - Show environment
        run: |
          echo "=== .env content ==="
          cat .env
          echo "=== gradle.properties content ==="
          cat gradle.properties
          echo "=== Keystore exists ==="
          ls -la credentials/android/app.keystore
          echo "=== PHP env vars ==="
          php -r "echo 'ANDROID_KEYSTORE_FILE: ' . getenv('ANDROID_KEYSTORE_FILE') . PHP_EOL;"


      - name: Build APK
        run: |
          php artisan native:package android --no-interaction
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          CI: "true"
          TERM: "dumb"
          NATIVEPHP_SKIP_TTY_CHECK: "1"

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          find nativephp/android/app/build -name "*.apk" -type f 2>/dev/null || true
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: |
            nativephp/android/app/build/outputs/apk/release/*.apk
            nativephp/android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: warn
