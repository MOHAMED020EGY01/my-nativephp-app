name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip, curl, fileinfo, dom, xml
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader

      - name: Install NativePHP Mobile
        run: |
          composer require nativephp/mobile --no-interaction
          php artisan native:install --no-interaction

      # ✅ جديد: تحقق من native.php قبل الـ build
      - name: Verify native.php exists BEFORE build
        run: |
          echo "=== Checking native.php before build ==="
          if [ -f "vendor/nativephp/mobile/bootstrap/android/native.php" ]; then
            echo "✅ native.php found!"
          else
            echo "❌ native.php NOT found!"
            exit 1
          fi

      - name: Create Keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Set environment variables
        run: |
          echo "ANDROID_KEYSTORE_FILE=credentials/android/app.keystore" >> .env
          echo "ANDROID_KEYSTORE_PASSWORD=android" >> .env
          echo "ANDROID_KEY_ALIAS=myapp" >> .env
          echo "ANDROID_KEY_PASSWORD=android" >> .env

      - name: Install expect for unbuffer
        run: sudo apt-get update && sudo apt-get install -y expect

      # ✅ جديد: تحقق من حجم الباندل
      - name: Check bundle archive size
        run: |
          echo "=== Checking bundle size ==="
          find nativephp/android/app/src/main/assets -name "*.zip" -exec ls -lh {} \;
          du -sh nativephp/android/app/src/main/assets/ || echo "⚠️ Assets folder not found"

      - name: Build APK
        run: |
          chmod +x nativephp/android/gradlew
          if command -v unbuffer &> /dev/null; then
            unbuffer php artisan native:package android --no-interaction
          elif command -v stdbuf &> /dev/null; then
            stdbuf -oL -eL php artisan native:package android --no-interaction
          else
            php artisan native:package android --no-interaction
          fi
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          CI: "true"
          TERM: "dumb"
          NATIVEPHP_SKIP_TTY_CHECK: "1"

      # ✅ جديد: تحقق من محتوى الـ APK
      - name: Extract and verify APK contents
        run: |
          echo "=== Extracting APK to verify contents ==="
          mkdir -p /tmp/apk-extract
          cd /tmp/apk-extract
          unzip -o /home/runner/work/my-nativephp-app/my-nativephp-app/nativephp/android/app/build/outputs/apk/release/app-release.apk
          echo "=== Looking for native.php ==="
          find . -name "native.php" -type f
          echo "=== Assets size ==="
          du -sh assets/ || true
        continue-on-error: true

      - name: Find and Upload APK
        run: |
          echo "Searching for APK files..."
          find nativephp/android/app/build -name "*.apk" -type f || true
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: |
            nativephp/android/app/build/outputs/apk/release/*.apk
            nativephp/android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: warn
