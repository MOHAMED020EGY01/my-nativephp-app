name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip, curl, fileinfo, dom, xml
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader

      - name: Install NativePHP Mobile
        run: |
          composer require nativephp/mobile --no-interaction
          php artisan native:install --no-interaction

      - name: Verify native.php exists BEFORE build
        run: |
          if [ -f "vendor/nativephp/mobile/bootstrap/android/native.php" ]; then
            echo "native.php found"
          else
            echo "native.php NOT found"
            exit 1
          fi

      - name: Create Keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Install expect for unbuffer
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Check bundle archive size
        run: |
          find nativephp/android/app/src/main/assets -name "*.zip" -exec ls -lh {} \;
          du -sh nativephp/android/app/src/main/assets/ || echo "Assets folder not found"

      - name: Verify native.php path
        run: |
          find vendor/nativephp/mobile -name "native.php" -type f
          ls -la vendor/nativephp/mobile/bootstrap/android/ || echo "Directory not found"

      - name: Build APK with explicit Gradle properties
        run: |
          cat > gradle.properties << 'EOF'
          nativephp.app_id=com.mohamedmohamed.swiftgoldenlunar
          nativephp.version_code=${{ github.run_number }}
          nativephp.version_name=1.0.${{ github.run_number }}
          nativephp.minify_enabled=false
          nativephp.shrink_resources=false
          nativephp.debug_symbols=FULL
          MYAPP_UPLOAD_STORE_FILE=credentials/android/app.keystore
          MYAPP_UPLOAD_KEY_ALIAS=myapp
          MYAPP_UPLOAD_STORE_PASSWORD=android
          MYAPP_UPLOAD_KEY_PASSWORD=android
          EOF
          php artisan native:package android --no-interaction
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          CI: "true"
          TERM: "dumb"
          NATIVEPHP_SKIP_TTY_CHECK: "1"

      - name: Extract and verify APK contents
        run: |
          mkdir -p /tmp/apk-extract
          cd /tmp/apk-extract
          APK_PATH=$(find /home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }} -name "app-release.apk" -type f | head -1)
          if [ -f "$APK_PATH" ]; then
            unzip -o "$APK_PATH"
            echo "APK extracted successfully"
          else
            echo "APK not found"
            find /home/runner/work -name "*.apk" -type f || true
            exit 1
          fi
          find . -name "native.php" -type f
          du -sh assets/ || true
        continue-on-error: true

      - name: Deep check native.php inside laravel_bundle.zip
        run: |
          cd /tmp/apk-extract/assets
          unzip -l laravel_bundle.zip | grep -i "native.php" || echo "native.php NOT found in bundle"
          unzip -l laravel_bundle.zip | grep -i "vendor/nativephp/mobile/bootstrap/android/native.php" || echo "Not in expected path"
          unzip -l laravel_bundle.zip | head -50
          ls -lh laravel_bundle.zip
        continue-on-error: true

      - name: Find and Upload APK
        run: |
          echo "Searching for APK files"
          find nativephp/android/app/build -name "*.apk" -type f || true
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: |
            nativephp/android/app/build/outputs/apk/release/*.apk
            nativephp/android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: warn
