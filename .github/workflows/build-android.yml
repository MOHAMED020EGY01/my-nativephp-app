name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04  # ✅ نسخة أكثر استقرارًا

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip, curl, fileinfo, dom, xml
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'  # ✅ حدد نسخة الـ SDK

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ✅ حذف --no-scripts عشان الـ NativePHP يشتغل صح
      - name: Install dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader

      # ✅ حذف --no-scripts هنا كمان
      - name: Install NativePHP Mobile
        run: |
          composer require nativephp/mobile --no-interaction
          php artisan native:install --no-interaction

      - name: Create Keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Set environment variables
        run: |
          echo "ANDROID_KEYSTORE_FILE=credentials/android/app.keystore" >> .env
          echo "ANDROID_KEYSTORE_PASSWORD=android" >> .env
          echo "ANDROID_KEY_ALIAS=myapp" >> .env
          echo "ANDROID_KEY_PASSWORD=android" >> .env

      # ✅ بديل أكثر توافقًا لـ TTY hack
      - name: Build APK
        run: |
          # منح صلاحيات للـ gradlew
          chmod +x nativephp/android/gradlew

          # محاولة تجاوز مشكلة TTY باستخدام unbuffer أو stdbuf
          if command -v unbuffer &> /dev/null; then
            unbuffer php artisan native:package android --no-interaction
          elif command -v stdbuf &> /dev/null; then
            stdbuf -oL -eL php artisan native:package android --no-interaction
          else
            # fallback: جرب عادي مع CI=true
            php artisan native:package android --no-interaction
          fi
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          CI: "true"
          TERM: "xterm"
          NATIVEPHP_SKIP_TTY_CHECK: "1"  # ✅ متغير قد يساعد لو موجود في الكود

      # ✅ بحث عن الـ APK في مسارات متعددة
      - name: Find and Upload APK
        run: |
          echo "Searching for APK files..."
          find nativephp/android/app/build -name "*.apk" -type f || true
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: |
            nativephp/android/app/build/outputs/apk/release/*.apk
            nativephp/android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: warn  # ✅ يظهر تحذير بدل فشل الـ job
