name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  # ✅ 8.2 أكثر استقرارًا من 8.4 حاليًا
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip, curl, fileinfo
          tools: composer:v2
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader

      - name: Install NativePHP Mobile
        run: |
          composer require nativephp/mobile --no-interaction
          php artisan native:install --no-interaction

      - name: Create Keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Set environment variables
        run: |
          echo "ANDROID_KEYSTORE_FILE=credentials/android/app.keystore" >> .env
          echo "ANDROID_KEYSTORE_PASSWORD=android" >> .env
          echo "ANDROID_KEY_ALIAS=myapp" >> .env
          echo "ANDROID_KEY_PASSWORD=android" >> .env

      - name: Build APK
        run: php artisan native:package android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: nativephp/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
