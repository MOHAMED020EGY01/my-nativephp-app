name: Build NativePHP Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, zip
          tools: composer:v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ تم التعديل هنا: إضافة --ignore-scripts
      - name: Install Composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --ignore-scripts

      # ✅ تم إضافة خطوة التثبيت اليدوي لـ NativePHP
      - name: Setup NativePHP Mobile manually
        run: |
          composer require nativephp/mobile --no-interaction --ignore-scripts
          php artisan native:install --no-interaction

      - name: Generate debug keystore
        run: |
          mkdir -p credentials/android
          keytool -genkey -v -keystore credentials/android/app.keystore \
            -alias myapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MyApp,OU=Dev,O=MyOrg,L=Cairo,ST=Cairo,C=EG" \
            -noprompt

      - name: Configure signing
        run: |
          echo "ANDROID_KEYSTORE_FILE=credentials/android/app.keystore" >> .env
          echo "ANDROID_KEYSTORE_PASSWORD=android" >> .env
          echo "ANDROID_KEY_ALIAS=myapp" >> .env
          echo "ANDROID_KEY_PASSWORD=android" >> .env

      - name: Build APK
        run: php artisan native:package android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: nativephp/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
